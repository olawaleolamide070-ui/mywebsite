<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Academic Planner - Olawale Olamide</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <nav>
        <div class="nav-container">
            <a href="index.html" class="logo">OO</a>
            <button class="hamburger" id="hamburger" aria-label="Menu">
                <span></span>
                <span></span>
                <span></span>
            </button>
            <ul class="nav-menu" id="navMenu">
                <li><a href="index.html">Home</a></li>
                <li><a href="about.html">About Me</a></li>
                <li><a href="projects.html">Projects</a></li>
                <li><a href="planner.html">Academic Planner</a></li>
                <li><a href="contact.html">Contact</a></li>
            </ul>
        </div>
    </nav>

    <div class="container">
        <h2 class="section-title">Academic Planner</h2>

        <div class="planner-container">
            <div class="card">
                <div class="input-group">
                    <input type="text" id="taskInput" placeholder="Enter a task...">
                    <button onclick="addTask()">Add Task</button>
                </div>

                <ul class="task-list" id="taskList"></ul>
            </div>
        </div>
    </div>

    <footer>
        <p>&copy; 2026 Olawale Olamide. All rights reserved.</p>
    </footer>

    <script>
        function addTask() {
            const input = document.getElementById('taskInput');
            const taskText = input.value.trim();

            if (taskText === '') {
                alert('Please enter a task');
                return;
            }

            const taskList = document.getElementById('taskList');
            const li = document.createElement('li');
            li.className = 'task-item';
            li.innerHTML = `
                <span>${taskText}</span>
                <button class="btn-complete" onclick="completeTask(this)">Complete</button>
                <button class="btn-delete" onclick="deleteTask(this)">Delete</button>
            `;

            taskList.appendChild(li);
            input.value = '';
        }

        function completeTask(button) {
            const taskItem = button.parentElement;
            taskItem.classList.toggle('completed');
            button.textContent = taskItem.classList.contains('completed') ? 'Undo' : 'Complete';
        }

        function deleteTask(button) {
            const taskItem = button.parentElement;
            taskItem.remove();
        }

        document.getElementById('taskInput').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                addTask();
            }
        });
    </script>
    <script src="script.js"></script>
</body>
</html>
